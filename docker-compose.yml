services:
  app:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pedidos_db
      DB_USERNAME: pedidos_user
      DB_PASSWORD: secret
      TZ: America/Guayaquil
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
      [ -f .env ] || cp .env.example .env;
      grep -q '^APP_KEY=base64:' .env || php artisan key:generate --force;
      composer install --no-interaction --optimize-autoloader --no-scripts;
      php artisan optimize:clear;
      apache2-foreground
      "

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    command: --skip-name-resolve #MySQL debe ignoras busquedas DNS
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: pedidos_db
      MYSQL_USER: pedidos_user
      MYSQL_PASSWORD: secret
      TZ: America/Guayaquil
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 10s
      retries: 5

volumes:
  db_data: